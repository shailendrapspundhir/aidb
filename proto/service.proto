syntax = "proto3";

package aidb;

// aiDB gRPC Service for multi-model database
// Unified layer for SQL (DataFusion), NoSQL (JSON/Serde in Sled), Vectors (HNSW)
// Supports hybrid queries with predicate push-down for performance.

service AiDbService {
  // Auth & Management
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc CreateTenant (CreateTenantRequest) returns (CreateTenantResponse);
  rpc CreateEnvironment (CreateEnvironmentRequest) returns (CreateEnvironmentResponse);
  rpc CreateCollection (CreateCollectionRequest) returns (CreateCollectionResponse);

  // Insert metadata (as Arrow internally) and vector into storage
  rpc Insert (InsertRequest) returns (InsertResponse);
  // Batch insert metadata and vectors
  rpc BatchInsert (BatchInsertRequest) returns (InsertResponse);
  // Insert full NoSQL Document (JSON for unstructured/flexible schema)
  rpc InsertDoc (InsertDocRequest) returns (InsertResponse);
  // Batch insert full NoSQL Documents
  rpc BatchInsertDoc (BatchInsertDocRequest) returns (InsertResponse);
  // Text-based search (placeholder)
  rpc Search (SearchRequest) returns (SearchResponse);
  // Full/partial text search
  rpc TextSearch (TextSearchRequest) returns (TextSearchResponse);
  // Vector-based ANN search using HNSW index
  rpc VectorSearch (VectorSearchRequest) returns (SearchResponse);
  // Execute SQL query on projected Arrow data (from NoSQL JSON)
  // Enables structured queries on docs table (e.g., SELECT * FROM docs WHERE category='AI')
  rpc ExecuteSql (SqlRequest) returns (SqlResponse);
  // Hybrid search: SQL filter + vector similarity (push-down optimized)
  // e.g., category filter on SQL + ANN for max perf without data movement
  rpc HybridSearch (HybridRequest) returns (HybridResponse);

  // RAG System Operations
  // Ingest text into RAG system (chunk, embed, store)
  rpc RagIngest (RagIngestRequest) returns (RagIngestResponse);
  // Search RAG documents using semantic similarity
  rpc RagSearch (RagSearchRequest) returns (RagSearchResponse);
  // Get RAG document chunks by document ID
  rpc RagGetDoc (RagGetDocRequest) returns (RagGetDocResponse);
  // Delete RAG document and all its chunks
  rpc RagDeleteDoc (RagDeleteDocRequest) returns (RagDeleteDocResponse);
  // List all RAG document IDs in a collection
  rpc RagListDocs (RagListDocsRequest) returns (RagListDocsResponse);
  // Generate embedding for text
  rpc RagEmbed (RagEmbedRequest) returns (RagEmbedResponse);
}

message RegisterRequest { string username = 1; string password = 2; }
message RegisterResponse { bool success = 1; }
message LoginRequest { string username = 1; string password = 2; }
message LoginResponse { 
  string token = 1; 
  string session_id = 2;  // Session ID for log tracking
}

message CreateTenantRequest { string id = 1; string name = 2; }
message CreateTenantResponse { bool success = 1; }
message CreateEnvironmentRequest { string tenant_id = 1; string id = 2; string name = 3; }
message CreateEnvironmentResponse { bool success = 1; }
message CreateCollectionRequest { string env_id = 1; string id = 2; string name = 3; }
message CreateCollectionResponse { bool success = 1; }

message InsertRequest {
  string id = 1;
  string text = 2;  // Metadata text, converted to Arrow RecordBatch
  repeated float vector = 3;  // Embedding vector stored in Sled
  string collection_id = 4;
}

message InsertDocRequest {
  string id = 1;
  string text = 2;
  string category = 3;  // For SQL filtering
  repeated float vector = 4;
  string metadata_json = 5;  // Flexible NoSQL JSON blob (Serde)
  string collection_id = 6;
}

message InsertResponse {
  bool success = 1;
}

message BatchInsertRequest {
  repeated InsertRequest requests = 1;
  string collection_id = 2;
}

message BatchInsertDocRequest {
  repeated InsertDocRequest requests = 1;
  string collection_id = 2;
}

message SearchRequest {
  string query = 1;
  string collection_id = 2;
}

message VectorSearchRequest {
  repeated float query_vector = 1;  // Query embedding
  uint32 top_k = 2;  // Number of nearest neighbors
  string collection_id = 3;
}

message SqlRequest {
  string sql = 1;  // SQL query on 'docs' table (DataFusion)
  string collection_id = 2;
}

message SqlResponse {
  // Serialized Arrow IPC for results (vectorized SQL output)
  bytes arrow_data = 1;
}

message HybridRequest {
  string sql_filter = 1;  // SQL predicate (e.g., "category = 'AI'")
  repeated float query_vector = 2;  // For vector ANN
  uint32 top_k = 3;
  string collection_id = 4;
}

message HybridResponse {
  repeated string results = 1;  // Doc IDs or serialized JSON
  repeated bool cache_hits = 2; // True if doc fetched from cache
  // Extend with full docs for NoSQL return
}

message SearchResponse {
  repeated string results = 1;  // IDs of matching documents
}

message TextSearchRequest {
  string query = 1;
  string collection_id = 2;
  bool partial_match = 3;
  bool case_sensitive = 4;
  bool include_metadata = 5;
}

message TextSearchItem {
  string id = 1;
  string text = 2;
  string category = 3;
}

message TextSearchResponse {
  bool success = 1;
  string message = 2;
  repeated TextSearchItem results = 3;
}

// === RAG System Messages ===

// Request to ingest text into RAG system
message RagIngestRequest {
  string doc_id = 1;           // Unique document identifier
  string text = 2;             // Text content to ingest
  string collection_id = 3;    // Collection to store in
  string metadata_json = 4;    // Optional metadata as JSON
  string source = 5;           // Optional source identifier (e.g., file path, URL)
}

// Response for RAG ingestion
message RagIngestResponse {
  bool success = 1;
  string message = 2;
  string doc_id = 3;
  uint32 chunks_created = 4;
}

// Request to search RAG documents
message RagSearchRequest {
  string query = 1;            // Search query text
  string collection_id = 2;    // Collection to search in
  uint32 top_k = 3;            // Number of results to return
}

// Single result item in RAG search
message RagResultItem {
  string chunk_id = 1;
  string doc_id = 2;
  string text = 3;
  float score = 4;
  string metadata_json = 5;
}

// Response for RAG search
message RagSearchResponse {
  bool success = 1;
  string message = 2;
  repeated RagResultItem results = 3;
}

// Request to get RAG document chunks
message RagGetDocRequest {
  string collection_id = 1;
  string doc_id = 2;
}

// RAG document chunk
message RagChunk {
  string id = 1;
  string doc_id = 2;
  string text = 3;
  repeated float embedding = 4;
  uint32 chunk_index = 5;
  uint32 total_chunks = 6;
  string source = 7;
  string created_at = 8;
  string metadata_json = 9;
}

// Response for getting RAG document
message RagGetDocResponse {
  bool success = 1;
  repeated RagChunk chunks = 2;
}

// Request to delete RAG document
message RagDeleteDocRequest {
  string collection_id = 1;
  string doc_id = 2;
}

// Response for deleting RAG document
message RagDeleteDocResponse {
  bool success = 1;
  string message = 2;
}

// Request to list RAG documents
message RagListDocsRequest {
  string collection_id = 1;
}

// Response for listing RAG documents
message RagListDocsResponse {
  bool success = 1;
  repeated string doc_ids = 2;
}

// Request to generate embedding
message RagEmbedRequest {
  string text = 1;
}

// Response for embedding generation
message RagEmbedResponse {
  bool success = 1;
  repeated float embedding = 2;
  uint32 dimension = 3;
}